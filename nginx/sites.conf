# Site definitions: one per line
# Add new sites by adding a line - no need to touch nginx config
#
# Format: domains => path [ssl|cloudflare]
#
#   ssl       = Let's Encrypt HTTPS (domain must point to this server)
#   cloudflare = HTTP only (Cloudflare Flexible - SSL at edge)
#   (no flag) = HTTP only
#
# Root path for Laravel: /var/www/example1.com/public_html/public
#
# example1.com (ssl) = main domain, Let's Encrypt
# example2.com (ssl) = school whitelabel, Let's Encrypt
# example3.com (cloudflare) = Cloudflare-proxied, no origin cert

example1.com .example1.com => /var/www/example1.com/public_html/public ssl
example2.com => /var/www/example1.com/public_html/public ssl
# example3.com => /var/www/example1.com/public_html/public cloudflare
